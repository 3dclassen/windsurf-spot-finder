<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f1117">
  <title>Windsurf Spot Finder</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="hdr">
    <div class="hdr-ico">🏄</div>
    <div class="hdr-title">Spot<span>Finder</span></div>
    <div class="hdr-right">
      <a id="admin-link" href="admin.html" class="btn-icon hidden" title="Admin">⚙️</a>
    </div>
  </header>

  <!-- Filter -->
  <div class="filter-panel">

    <div>
      <div class="lbl">Windrichtung</div>
      <div id="wind-group" class="toggle-group"></div>
    </div>

    <div>
      <div class="lbl">Disziplin</div>
      <div id="disz-group" class="toggle-group"></div>
    </div>

    <div>
      <div class="lbl">Sport</div>
      <div id="sport-group" class="toggle-group"></div>
    </div>

    <div class="search-wrap">
      <input
        id="search-input"
        class="search-input"
        type="search"
        placeholder="Spot oder Region suchen…"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      >
      <button id="search-clear" class="search-clear" type="button">✕</button>
    </div>

  </div>

  <!-- Location bar -->
  <div id="loc-bar" class="loc-bar loading">
    <div class="loc-dot"></div>
    <span id="loc-text">Standort wird ermittelt…</span>
  </div>

  <!-- Results -->
  <div class="results">
    <div class="results-header">
      <div id="result-count" class="results-count"></div>
    </div>
    <div id="results-list">
      <div class="spinner"></div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
